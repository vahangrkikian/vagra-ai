<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vagra Theme Demos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; }
        .header { background: #1a1a2e; color: #fff; padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 1.4rem; font-weight: 600; }
        .header .links a { color: #a0aec0; text-decoration: none; margin-left: 20px; font-size: 0.9rem; }
        .header .links a:hover { color: #fff; }
        .tabs { display: flex; gap: 0; background: #fff; border-bottom: 2px solid #e2e8f0; padding: 0 40px; }
        .tab { padding: 14px 24px; cursor: pointer; font-weight: 500; color: #64748b; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
        .tab:hover { color: #1a1a2e; }
        .tab.active { color: #3366FF; border-bottom-color: #3366FF; }
        .preview-container { display: flex; height: calc(100vh - 120px); }
        .preview-frame { flex: 1; border: none; display: none; }
        .preview-frame.active { display: block; }
        .split .preview-frame { display: block; flex: 1; border-right: 2px solid #e2e8f0; }
        .split .preview-frame:last-child { border-right: none; }
        .mode-toggle { background: #3366FF; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        .mode-toggle:hover { background: #2952CC; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Vagra Theme Demos</h1>
        <div style="display:flex;align-items:center;gap:16px;">
            <button class="mode-toggle" onclick="toggleMode()">Split View</button>
            <div class="links">
                <a href="http://vagraai.local/wp-admin/customize.php?theme=vagra-msp" target="_blank">MSP Customizer</a>
                <a href="http://vagraai.local/wp-admin/customize.php?theme=vagra-legal" target="_blank">Legal Customizer</a>
                <a href="http://vagraai.local/wp-admin/customize.php?theme=vagra-nslookup" target="_blank">NSLookup Customizer</a>
                <a href="http://vagraai.local/wp-admin/customize.php?theme=carvice" target="_blank">Carvice Customizer</a>
            </div>
        </div>
    </div>
    <div class="tabs" id="tabs">
        <div class="tab active" onclick="showTab('msp')">Vagra MSP</div>
        <div class="tab" onclick="showTab('legal')">Vagra Legal</div>
        <div class="tab" onclick="showTab('nslookup')">Vagra NSLookup</div>
        <div class="tab" onclick="showTab('carvice')">Carvice</div>
    </div>
    <div class="preview-container" id="container">
        <iframe class="preview-frame active" id="frame-msp" src="http://vagraai.local/?preview_theme=vagra-msp"></iframe>
        <iframe class="preview-frame" id="frame-legal" src="http://vagraai.local/?preview_theme=vagra-legal"></iframe>
        <iframe class="preview-frame" id="frame-nslookup" src="http://vagraai.local/?preview_theme=vagra-nslookup"></iframe>
        <iframe class="preview-frame" id="frame-carvice" src="http://vagraai.local/?preview_theme=carvice"></iframe>
    </div>

    <script>
        let splitMode = false;

        function showTab(theme) {
            if (splitMode) return;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.preview-frame').forEach(f => f.classList.remove('active'));
            const tabMap = { msp: 0, legal: 1, nslookup: 2, carvice: 3 };
            document.querySelectorAll('.tab')[tabMap[theme]].classList.add('active');
            document.getElementById('frame-' + theme).classList.add('active');
        }

        function toggleMode() {
            splitMode = !splitMode;
            const container = document.getElementById('container');
            const btn = document.querySelector('.mode-toggle');
            const tabs = document.getElementById('tabs');
            if (splitMode) {
                container.classList.add('split');
                btn.textContent = 'Tab View';
                tabs.style.display = 'none';
                document.querySelectorAll('.preview-frame').forEach(f => f.classList.add('active'));
            } else {
                container.classList.remove('split');
                btn.textContent = 'Split View';
                tabs.style.display = 'flex';
                showTab('msp');
            }
        }
    </script>
</body>
</html>
